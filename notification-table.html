<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Table - SB Design System</title>
  <style>
    :root {
      --color-bg: #0a0a0f;
      --color-surface: #13131a;
      --color-surface-hover: #1a1a24;
      --color-border: #2a2a3a;
      --color-text: #e4e4ed;
      --color-text-secondary: #9494a8;
      --color-text-muted: #6b6b80;
      --color-accent: #6366f1;
      --color-accent-hover: #818cf8;

      /* Badge colors */
      --badge-push-bg: #1e3a5f;
      --badge-push-text: #60a5fa;
      --badge-toast-bg: #3b2f1a;
      --badge-toast-text: #fbbf24;
      --badge-dialog-bg: #2d1b3d;
      --badge-dialog-text: #c084fc;
      --badge-email-bg: #1a332a;
      --badge-email-text: #34d399;
      --badge-banner-bg: #3b1f1f;
      --badge-banner-text: #f87171;
      --badge-live-bg: #1a2d3d;
      --badge-live-text: #38bdf8;
      --badge-widget-bg: #2d2a1a;
      --badge-widget-text: #e2b96f;
      --badge-dynamic-bg: #1f2d3b;
      --badge-dynamic-text: #7dd3fc;

      /* Phase colors */
      --phase1-bg: #1a3328;
      --phase1-text: #4ade80;
      --phase2-bg: #2d2a1a;
      --phase2-text: #fbbf24;
      --phase3-bg: #2d1b1b;
      --phase3-text: #f87171;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border);
      padding: 16px 32px;
    }

    .header-inner {
      max-width: 1800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .count-badge {
      background: var(--color-accent);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
    }

    /* Controls */
    .controls {
      padding: 16px 32px;
      max-width: 1800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 240px;
      max-width: 400px;
    }

    .search-box input {
      width: 100%;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 8px 12px 8px 36px;
      color: var(--color-text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--color-accent);
    }

    .search-box input::placeholder {
      color: var(--color-text-muted);
    }

    .search-box svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
    }

    .filter-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 6px 14px;
      color: var(--color-text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      background: var(--color-surface-hover);
      color: var(--color-text);
    }

    .filter-btn.active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    /* Table Container */
    .table-container {
      padding: 0 32px 32px;
      max-width: 1800px;
      margin: 0 auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }

    thead {
      position: sticky;
      top: 61px;
      z-index: 50;
    }

    thead th {
      background: var(--color-surface);
      color: var(--color-text-muted);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--color-border);
      white-space: nowrap;
      user-select: none;
      cursor: pointer;
    }

    thead th:first-child {
      border-radius: 8px 0 0 0;
    }

    thead th:last-child {
      border-radius: 0 8px 0 0;
    }

    thead th:hover {
      color: var(--color-text-secondary);
    }

    tbody tr {
      transition: background-color 0.1s;
    }

    tbody tr:hover {
      background: var(--color-surface-hover);
    }

    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      vertical-align: top;
    }

    /* Cell specific styles */
    .cell-index {
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      min-width: 36px;
      text-align: center;
    }

    .cell-section {
      font-weight: 500;
      color: var(--color-text);
      min-width: 160px;
    }

    .cell-types {
      min-width: 140px;
    }

    .cell-trigger {
      min-width: 200px;
      max-width: 300px;
      color: var(--color-text-secondary);
      font-size: 12.5px;
      line-height: 1.6;
    }

    .cell-purpose {
      min-width: 180px;
      max-width: 260px;
      color: var(--color-text-secondary);
      font-size: 12.5px;
      line-height: 1.6;
    }

    .cell-title {
      min-width: 180px;
      font-weight: 500;
    }

    .cell-body {
      min-width: 240px;
      max-width: 360px;
      font-size: 12.5px;
      line-height: 1.6;
    }

    .cell-body .en {
      color: var(--color-text);
    }

    .cell-body .ja {
      color: var(--color-text-muted);
      font-size: 11.5px;
      display: block;
      margin-top: 4px;
    }

    .cell-destination {
      min-width: 160px;
      max-width: 220px;
      color: var(--color-text-secondary);
      font-size: 12.5px;
    }

    .cell-phase {
      min-width: 80px;
      text-align: center;
    }

    .cell-figma {
      min-width: 70px;
      text-align: center;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      margin: 2px 3px 2px 0;
      white-space: nowrap;
    }

    .badge-push { background: var(--badge-push-bg); color: var(--badge-push-text); }
    .badge-toast { background: var(--badge-toast-bg); color: var(--badge-toast-text); }
    .badge-dialog { background: var(--badge-dialog-bg); color: var(--badge-dialog-text); }
    .badge-email { background: var(--badge-email-bg); color: var(--badge-email-text); }
    .badge-banner { background: var(--badge-banner-bg); color: var(--badge-banner-text); }
    .badge-live-activity { background: var(--badge-live-bg); color: var(--badge-live-text); }
    .badge-widget { background: var(--badge-widget-bg); color: var(--badge-widget-text); }
    .badge-dynamic-island { background: var(--badge-dynamic-bg); color: var(--badge-dynamic-text); }

    .badge-phase {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-phase-1 { background: var(--phase1-bg); color: var(--phase1-text); }
    .badge-phase-2 { background: var(--phase2-bg); color: var(--phase2-text); }
    .badge-phase-3 { background: var(--phase3-bg); color: var(--phase3-text); }

    /* Figma link */
    .figma-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      text-decoration: none;
      transition: all 0.15s;
      margin: 1px;
    }

    .figma-link:hover {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    /* Row detail expansion */
    .row-detail {
      display: none;
    }

    .row-detail.show {
      display: table-row;
    }

    .row-detail td {
      background: var(--color-surface);
      padding: 16px 24px;
      border-bottom: 1px solid var(--color-border);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .detail-item label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: 4px;
    }

    .detail-item p {
      font-size: 13px;
      color: var(--color-text);
      line-height: 1.6;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .empty-state svg {
      margin-bottom: 12px;
      opacity: 0.4;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; }
      .controls { padding: 12px 16px; }
      .table-container { padding: 0 16px 16px; }
    }
  </style>
</head>

  </div>

  <div class="controls">

  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Section</th>
          <th>Type</th>

    </div>
  </div>

// State
let activePhase = 'all';
let activeTypes = new Set();
let searchQuery = '';

// Badge class mapping
function getBadgeClass(type) {
  const map = {
    'Push': 'badge-push',
    'Toast': 'badge-toast',
    'Dialog': 'badge-dialog',
    'Email': 'badge-email',
    'Banner': 'badge-banner',
    'Live Activity': 'badge-live-activity',
    'Widget': 'badge-widget',
    'Dynamic Island': 'badge-dynamic-island'
  };
  return map[type] || '';
}

function getPhaseClass(phase) {
  if (phase === 'Phase 1') return 'badge-phase-1';
  if (phase === 'Phase 2') return 'badge-phase-2';
  if (phase === 'Phase 3') return 'badge-phase-3';
  return '';
}

function parseBody(text) {
  const match = text.match(/^(.*?)\s*\[(.+)\]$/s);
  if (match) {
    return `<span class="en">${escapeHtml(match[1].trim())}</span><span class="ja">${escapeHtml(match[2])}</span>`;
  }
  return `<span class="en">${escapeHtml(text)}</span>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const emptyState = document.getElementById('emptyState');
  const countBadge = document.getElementById('rowCount');

  const filtered = notificationData.filter(item => {
    // Phase filter
    if (activePhase !== 'all' && item.Phase !== activePhase) return false;

    // Type filter
    if (activeTypes.size > 0) {
      const hasType = item['通知の種類_list'].some(t => activeTypes.has(t));
      if (!hasType) return false;
    }

    // Search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const searchable = [
        item['対応箇所'],
        item['トリガー'],
        item['目的'],
        item['タイトル案_UK'],
        item['本文案_UK'],
        item['遷移先'],
        ...item['通知の種類_list']
      ].join(' ').toLowerCase();
      if (!searchable.includes(q)) return false;
    }

    return true;
  });

  countBadge.textContent = `${filtered.length} / ${notificationData.length} items`;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }

  emptyState.style.display = 'none';

  tbody.innerHTML = filtered.map(item => {
    const typeBadges = item['通知の種類_list'].map(t =>
      `<span class="badge ${getBadgeClass(t)}">${escapeHtml(t)}</span>`
    ).join('');

    const figmaLinks = (item.figma_links || []).map((link, i) =>
      `<a href="${link}" target="_blank" rel="noopener" class="figma-link" title="Figma ${i + 1}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>`
    ).join('');

    return `<tr>
      <td class="cell-index">${item.index}</td>
      <td class="cell-section">${escapeHtml(item['対応箇所'])}</td>
      <td class="cell-types">${typeBadges}</td>
      <td class="cell-trigger">${escapeHtml(item['トリガー'])}</td>
      <td class="cell-purpose">${escapeHtml(item['目的'])}</td>
      <td class="cell-title">${escapeHtml(item['タイトル案_UK'])}</td>
      <td class="cell-body">${parseBody(item['本文案_UK'])}</td>
      <td class="cell-destination">${escapeHtml(item['遷移先'])}</td>
      <td class="cell-phase"><span class="badge-phase ${getPhaseClass(item.Phase)}">${escapeHtml(item.Phase)}</span></td>
      <td class="cell-figma">${figmaLinks}</td>
    </tr>`;
  }).join('');
}

// Phase filters
document.getElementById('phaseFilters').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#phaseFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activePhase = btn.dataset.phase;
  renderTable();
});

// Type filters (toggle)
document.getElementById('typeFilters').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  const type = btn.dataset.type;
  if (activeTypes.has(type)) {
    activeTypes.delete(type);
    btn.classList.remove('active');
  } else {
    activeTypes.add(type);
    btn.classList.add('active');
  }
  renderTable();
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderTable();
});

// Initial render
renderTable();
</script>
</body>
